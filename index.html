<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triathlon Lục Nam</title>
<link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>
<header>
  <h1>TRIATHLON LỤC NAM</h1>
  <p>Kỷ luật mỗi ngày - Mạnh hơn mỗi ngày</p>
</header>

<div class="cards">
  <div class="card">
    <h2>🏊 Bơi</h2>
    <p>Tổng hợp khối lượng bơi</p>
  </div>
  <div class="card">
    <h2>🚴 Đạp</h2>
    <p>Theo dõi quãng đường đạp</p>
  </div>
  <div class="card">
    <h2>🏃 Chạy</h2>
    <p>Theo dõi quãng đường chạy</p>
  </div>
</div>

<section>
<h2>Bảng xếp hạng tháng</h2>
<table>
<thead>
<tr>
<th>Thành viên</th>
<th>Bơi (km)</th>
<th>Đạp (km)</th>
<th>Chạy (km)</th>
</tr>
</thead>
<tbody>
<tr><td>Quân</td><td>6.695</td><td>...</td><td>...</td></tr>
<tr><td>Quang</td><td>10.515</td><td>...</td><td>...</td></tr>
<tr><td>Hưng</td><td>6.960</td><td>...</td><td>...</td></tr>
</tbody>
</table>
</section>

<footer>
<p>Triathlon Lục Nam Community</p>
</footer>
</body>
</html>
